apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chai-kafe-hpa
  namespace: chaikafe

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chai-kafe-app

  minReplicas: 2
  maxReplicas: 6

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
